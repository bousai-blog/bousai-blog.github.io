name: 週次記事自動生成

on:
  schedule:
    # 毎週水曜 22:00 JST (UTC 13:00)
    - cron: '0 13 * * 3'
  workflow_dispatch:
    inputs:
      topic_index:
        description: 'トピックインデックス（省略すると次のpendingを自動選択）'
        required: false
        default: ''
      dry_run:
        description: 'ドライラン（true=記事を保存しない）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: 依存ライブラリをインストール
        run: pip install -r scripts/requirements.txt

      - name: 記事を生成
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic_index }}" ]; then
            ARGS="--topic ${{ github.event.inputs.topic_index }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/generate_post.py $ARGS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Git の設定
        run: |
          git config user.name "そなえLAB Bot"
          git config user.email "bot@users.noreply.github.com"

      - name: 変更をコミット・プッシュ
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし（ドライランまたは重複スキップ）"
          else
            ARTICLE=$(git diff --staged --name-only | grep "^posts/" | grep "\.md$" | head -1)
            MSG="記事追加: $(date +'%Y-%m-%d')"
            if [ -n "$ARTICLE" ]; then
              BASENAME=$(basename "$ARTICLE" .md)
              MSG="記事追加: ${BASENAME}"
            fi
            git commit -m "${MSG}"
            git push
            echo "✅ コミット・プッシュ完了"
          fi
