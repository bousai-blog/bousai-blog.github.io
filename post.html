<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>移動しています…</title>
<script>
  var slug = new URLSearchParams(location.search).get('slug') || '';
  var safe = slug.replace(/[^a-zA-Z0-9\-_]/g, '');
  location.replace(safe ? '/posts/' + safe + '/' : '/');
</script>
</head>
<body><p>ページが移動しました。<a href="/">トップへ</a></p></body>
</html>
