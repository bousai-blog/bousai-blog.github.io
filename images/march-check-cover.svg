<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fae5dc"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#e8d4c4" opacity="0.4"/>

  <!-- ===== 中央：カレンダー ===== -->
  <g transform="translate(280 340)">
    <!-- 影 -->
    <ellipse cx="0" cy="170" rx="120" ry="11" fill="#000" opacity="0.12"/>

    <!-- カレンダー本体 -->
    <rect x="-110" y="-130" width="220" height="280" rx="8" fill="#fff" stroke="#5a3a23" stroke-width="3"/>

    <!-- カレンダーヘッダー（赤） -->
    <rect x="-110" y="-130" width="220" height="60" fill="#c0392b"/>
    <text x="0" y="-105" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#fff">March</text>
    <text x="0" y="-78" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" fill="#fff">2026年 3月</text>

    <!-- 日付グリッド -->
    <g font-family="sans-serif" font-size="14" fill="#5a3a23">
      <!-- 曜日ヘッダー -->
      <text x="-85" y="-45" text-anchor="middle" fill="#c0392b" font-weight="700">日</text>
      <text x="-50" y="-45" text-anchor="middle">月</text>
      <text x="-15" y="-45" text-anchor="middle">火</text>
      <text x="20" y="-45" text-anchor="middle">水</text>
      <text x="55" y="-45" text-anchor="middle">木</text>
      <text x="90" y="-45" text-anchor="middle">金</text>

      <!-- 1週目 -->
      <text x="-85" y="-20" text-anchor="middle" fill="#c0392b">1</text>
      <text x="-50" y="-20" text-anchor="middle">2</text>
      <text x="-15" y="-20" text-anchor="middle">3</text>
      <text x="20" y="-20" text-anchor="middle">4</text>
      <text x="55" y="-20" text-anchor="middle">5</text>
      <text x="90" y="-20" text-anchor="middle">6</text>

      <!-- 2週目 -->
      <text x="-85" y="5" text-anchor="middle" fill="#c0392b">8</text>
      <text x="-50" y="5" text-anchor="middle">9</text>
      <text x="-15" y="5" text-anchor="middle">10</text>
      <!-- 11日を強調 -->
      <circle cx="20" cy="0" r="14" fill="#c0392b" opacity="0.15"/>
      <text x="20" y="5" text-anchor="middle" font-weight="700" fill="#c0392b">11</text>
      <!-- 12日も少し強調 -->
      <circle cx="55" cy="0" r="14" fill="#e88a5a" opacity="0.3"/>
      <text x="55" y="5" text-anchor="middle" font-weight="700">12</text>
      <text x="90" y="5" text-anchor="middle">13</text>

      <!-- 3週目 -->
      <text x="-85" y="30" text-anchor="middle" fill="#c0392b">15</text>
      <text x="-50" y="30" text-anchor="middle">16</text>
      <text x="-15" y="30" text-anchor="middle">17</text>
      <text x="20" y="30" text-anchor="middle">18</text>
      <text x="55" y="30" text-anchor="middle">19</text>
      <text x="90" y="30" text-anchor="middle">20</text>

      <!-- 4週目 -->
      <text x="-85" y="55" text-anchor="middle" fill="#c0392b">22</text>
      <text x="-50" y="55" text-anchor="middle">23</text>
      <text x="-15" y="55" text-anchor="middle">24</text>
      <text x="20" y="55" text-anchor="middle">25</text>
      <text x="55" y="55" text-anchor="middle">26</text>
      <text x="90" y="55" text-anchor="middle">27</text>
    </g>

    <!-- 「点検の日」マーク -->
    <text x="0" y="105" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" fill="#c0392b" font-weight="700">3.11 を忘れない</text>
    <text x="0" y="128" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="12" fill="#7a5a3e">→ 点検の日</text>
  </g>

  <!-- ===== 右：リュックを開けて中身を出すイメージ ===== -->
  <g transform="translate(800 360)">
    <!-- 影 -->
    <ellipse cx="0" cy="170" rx="160" ry="12" fill="#000" opacity="0.1"/>

    <!-- リュック（少し小さめ） -->
    <g transform="translate(-80 -10)">
      <rect x="-65" y="-90" width="130" height="200" rx="14" fill="#8fa869"/>
      <path d="M-14 -90 Q-14 -118 0 -118 Q14 -118 14 -90" stroke="#5a6b3e" stroke-width="6" fill="none" stroke-linecap="round"/>
      <line x1="-45" y1="-25" x2="45" y2="-25" stroke="#5a6b3e" stroke-width="2"/>
      <rect x="-40" y="60" width="80" height="40" rx="6" fill="#7a9658" stroke="#5a6b3e" stroke-width="1.5"/>
      <text x="0" y="125" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" fill="#5a6b3e" font-weight="600">軽いリュック</text>
    </g>

    <!-- 矢印 -->
    <g stroke="#c0392b" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="-5" y1="0" x2="35" y2="0"/>
      <polyline points="25,-8 35,0 25,8"/>
    </g>

    <!-- 床に並んだ中身 -->
    <g transform="translate(95 0)">
      <!-- 缶詰 -->
      <ellipse cx="-35" cy="-30" rx="18" ry="6" fill="#888"/>
      <rect x="-53" y="-30" width="36" height="50" fill="#c0392b"/>
      <ellipse cx="-35" cy="20" rx="18" ry="6" fill="#666"/>
      <text x="-35" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">缶詰</text>

      <!-- お菓子の袋 -->
      <rect x="-7" y="-25" width="36" height="50" rx="4" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/>
      <text x="11" y="5" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff" font-weight="700">お菓子</text>

      <!-- 羊羹 -->
      <rect x="40" y="-20" width="40" height="45" rx="4" fill="#5a3a23"/>
      <text x="60" y="6" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">羊羹</text>

      <!-- 賞味期限チェックマーク -->
      <g transform="translate(20 50)">
        <circle r="22" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
        <path d="M-9 0 L-3 7 L10 -7" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="100" font-size="44" font-weight="700" fill="#5a3a23" letter-spacing="1">3月は、わが家の</text>
    <text x="600" y="155" font-size="44" font-weight="700" fill="#5a3a23" letter-spacing="1">「そなえ点検」の月</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="625" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#7a5a3e">10年以上続けている、年に一度のルーティン</text>
</svg>
