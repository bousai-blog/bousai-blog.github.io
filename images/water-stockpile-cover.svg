<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f1fb"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#d4e6f5" opacity="0.5"/>

  <!-- ===== 左：2Lペットボトル ===== -->
  <g transform="translate(300 270)">
    <!-- 影 -->
    <ellipse cx="0" cy="260" rx="80" ry="9" fill="#000" opacity="0.1"/>
    <!-- キャップ -->
    <rect x="-25" y="-50" width="50" height="20" rx="4" fill="#3b8bd4"/>
    <!-- 首 -->
    <rect x="-22" y="-30" width="44" height="25" fill="#b5d4f4"/>
    <!-- 本体（2L：背が高くて太い） -->
    <path d="M-60 -5 L-60 240 Q-60 255 -45 255 L45 255 Q60 255 60 240 L60 -5 Q60 -15 50 -15 L-50 -15 Q-60 -15 -60 -5 Z" fill="#b5d4f4" stroke="#378add" stroke-width="2"/>
    <!-- ラベル -->
    <rect x="-50" y="80" width="100" height="80" fill="#fff" stroke="#378add" stroke-width="1.5"/>
    <text x="0" y="110" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="28" font-weight="700" fill="#185fa5">2L</text>
    <text x="0" y="138" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#185fa5">天然水</text>
    <!-- 水のキラキラ -->
    <circle cx="-25" cy="40" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="-30" cy="55" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="-20" cy="200" r="3" fill="#fff" opacity="0.7"/>
    <!-- ラベル下 -->
    <text x="0" y="305" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" font-weight="600" fill="#185fa5">2L</text>
    <text x="0" y="328" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b6470">コスパ◎ でも回しにくい</text>
  </g>

  <!-- ===== 矢印 ===== -->
  <g transform="translate(600 380)">
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
    <polyline points="55,-12 70,0 55,12" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-25" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" font-weight="700" fill="#c0392b">移行中</text>
  </g>

  <!-- ===== 右：500mlペットボトル（小さめ、3本並べる） ===== -->
  <g transform="translate(900 320)">
    <!-- 影 -->
    <ellipse cx="0" cy="210" rx="130" ry="10" fill="#000" opacity="0.1"/>

    <!-- 1本目 -->
    <g transform="translate(-80 0)">
      <rect x="-15" y="-30" width="30" height="12" rx="2" fill="#3b8bd4"/>
      <rect x="-13" y="-18" width="26" height="15" fill="#b5d4f4"/>
      <path d="M-32 -3 L-32 195 Q-32 205 -22 205 L22 205 Q32 205 32 195 L32 -3 Q32 -10 25 -10 L-25 -10 Q-32 -10 -32 -3 Z" fill="#b5d4f4" stroke="#378add" stroke-width="2"/>
      <rect x="-25" y="55" width="50" height="55" fill="#fff" stroke="#378add" stroke-width="1.2"/>
      <text x="0" y="78" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#185fa5">500</text>
      <text x="0" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185fa5">ml</text>
    </g>

    <!-- 2本目 -->
    <g transform="translate(0 0)">
      <rect x="-15" y="-30" width="30" height="12" rx="2" fill="#3b8bd4"/>
      <rect x="-13" y="-18" width="26" height="15" fill="#b5d4f4"/>
      <path d="M-32 -3 L-32 195 Q-32 205 -22 205 L22 205 Q32 205 32 195 L32 -3 Q32 -10 25 -10 L-25 -10 Q-32 -10 -32 -3 Z" fill="#b5d4f4" stroke="#378add" stroke-width="2"/>
      <rect x="-25" y="55" width="50" height="55" fill="#fff" stroke="#378add" stroke-width="1.2"/>
      <text x="0" y="78" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#185fa5">500</text>
      <text x="0" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185fa5">ml</text>
    </g>

    <!-- 3本目 -->
    <g transform="translate(80 0)">
      <rect x="-15" y="-30" width="30" height="12" rx="2" fill="#3b8bd4"/>
      <rect x="-13" y="-18" width="26" height="15" fill="#b5d4f4"/>
      <path d="M-32 -3 L-32 195 Q-32 205 -22 205 L22 205 Q32 205 32 195 L32 -3 Q32 -10 25 -10 L-25 -10 Q-32 -10 -32 -3 Z" fill="#b5d4f4" stroke="#378add" stroke-width="2"/>
      <rect x="-25" y="55" width="50" height="55" fill="#fff" stroke="#378add" stroke-width="1.2"/>
      <text x="0" y="78" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#185fa5">500</text>
      <text x="0" y="98" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185fa5">ml</text>
    </g>

    <!-- ラベル下 -->
    <text x="0" y="255" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" font-weight="600" fill="#185fa5">500ml</text>
    <text x="0" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b6470">持ち運びやすい→消費しやすい</text>
  </g>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="100" font-size="46" font-weight="700" fill="#185fa5" letter-spacing="1">結局500mlが使いやすかった</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="625" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#5b6470">わが家の水備蓄、2Lから移行中の話</text>
</svg>
