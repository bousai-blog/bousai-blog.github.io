<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3548"/>
      <stop offset="100%" stop-color="#1a1e2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8d4" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffe89e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe89e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff8d4" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#fff0a8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff0a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景（暗い室内、停電中をイメージ） -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン（暗め） -->
  <rect y="540" width="1200" height="135" fill="#0f1218" opacity="0.6"/>

  <!-- ===== 左：普通の懐中電灯（光が一点に集中） ===== -->
  <g transform="translate(290 380)">
    <!-- 光の輪（円錐状） -->
    <ellipse cx="0" cy="-180" rx="80" ry="40" fill="url(#glow1)"/>
    <path d="M-30 -10 L-80 -180 L80 -180 L30 -10 Z" fill="url(#glow1)" opacity="0.4"/>

    <!-- 懐中電灯本体 -->
    <g transform="rotate(0)">
      <!-- 持ち手 -->
      <rect x="-22" y="-10" width="44" height="120" rx="6" fill="#3a4458" stroke="#1a1e2e" stroke-width="2"/>
      <!-- ボタン -->
      <circle cx="0" cy="50" r="6" fill="#c0392b"/>
      <!-- 先端部 -->
      <rect x="-30" y="-30" width="60" height="22" rx="4" fill="#5a6578" stroke="#1a1e2e" stroke-width="2"/>
      <!-- ライト部分 -->
      <ellipse cx="0" cy="-10" rx="26" ry="8" fill="#fff8d4" stroke="#9a8a40" stroke-width="2"/>
    </g>

    <!-- ラベル -->
    <text x="0" y="180" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#fff8d4">懐中電灯</text>
    <text x="0" y="205" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a8b0c0">光が一点に集中</text>
  </g>

  <!-- ===== 中央の矢印 ===== -->
  <g transform="translate(600 360)">
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#fff8d4" stroke-width="4" stroke-linecap="round"/>
    <polyline points="35,-12 50,0 35,12" stroke="#fff8d4" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-30" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" font-weight="700" fill="#fff8d4">袋に入れる</text>
    <text x="0" y="30" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" fill="#a8b0c0">＋スーパーの袋</text>
  </g>

  <!-- ===== 右：袋に入れた懐中電灯（光が拡散してランタン化） ===== -->
  <g transform="translate(900 380)">
    <!-- 大きな光のオーラ -->
    <circle cx="0" cy="-90" r="140" fill="url(#glow2)" opacity="0.8"/>
    <circle cx="0" cy="-90" r="100" fill="#fff0a8" opacity="0.4"/>

    <!-- スーパーの袋（白く膨らんだ形） -->
    <g>
      <!-- 袋本体（風船のように膨らんだ形） -->
      <path d="M-65 -40 Q-90 -110 -55 -150 Q-25 -180 0 -180 Q25 -180 55 -150 Q90 -110 65 -40 L60 30 Q55 50 30 50 L-30 50 Q-55 50 -60 30 Z"
            fill="#fff8d4" stroke="#d4c896" stroke-width="2.5" opacity="0.85"/>
      <!-- 取っ手部分 -->
      <path d="M-25 -178 Q-25 -200 -10 -200 L-5 -178" stroke="#d4c896" stroke-width="2" fill="none"/>
      <path d="M25 -178 Q25 -200 10 -200 L5 -178" stroke="#d4c896" stroke-width="2" fill="none"/>
      <!-- 結び目 -->
      <ellipse cx="0" cy="50" rx="15" ry="8" fill="#d4c896"/>

      <!-- 袋の中の懐中電灯（うっすら見える） -->
      <g opacity="0.4">
        <rect x="-12" y="-20" width="24" height="60" rx="3" fill="#5a6578"/>
        <rect x="-16" y="-30" width="32" height="12" rx="2" fill="#7a8598"/>
      </g>
    </g>

    <!-- ラベル -->
    <text x="0" y="120" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#fff8d4">ランタンに！</text>
    <text x="0" y="145" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff0a8">光がふわっと拡散</text>
  </g>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="90" font-size="44" font-weight="700" fill="#fff8d4" letter-spacing="1">スーパーの袋で</text>
    <text x="600" y="148" font-size="48" font-weight="700" fill="#ffe89e" letter-spacing="2">ランタンに？</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="625" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#a8b0c0">災害時のライト、わが家の備え方</text>
</svg>
