<svg xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f4e1d"/>
      <stop offset="100%" stop-color="#b5722a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="480" height="280" fill="url(#bg)"/>
  <circle cx="400" cy="40" r="80" fill="white" opacity="0.05"/>
  <circle cx="60" cy="240" r="60" fill="white" opacity="0.05"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1.5" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="480" height="280" fill="url(#dots)"/>
  <rect x="20" y="20" width="130" height="30" rx="15" fill="white" opacity="0.15"/>
  <text x="85" y="40" text-anchor="middle" font-size="13" fill="#f9d9a8" font-family="sans-serif" font-weight="bold">非常食・備蓄</text>
  <text x="240" y="100" text-anchor="middle" font-size="52" filter="url(#shadow)">🍳</text>
  <text x="240" y="145" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">カセットコンロは</text>
  <text x="240" y="178" text-anchor="middle" font-size="24" font-weight="bold" fill="white" font-family="sans-serif">家の防災の主役</text>
  <rect x="0" y="248" width="480" height="32" fill="black" opacity="0.3"/>
  <text x="240" y="269" text-anchor="middle" font-size="14" fill="white" opacity="0.9" font-family="sans-serif" font-weight="bold">そなえLAB</text>
</svg>
