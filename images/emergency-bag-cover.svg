<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdecea"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#e8dcc4" opacity="0.5"/>

  <!-- ===== 大きいリュック（避難用・防災グッズ） ===== -->
  <g transform="translate(250 250)">
    <ellipse cx="0" cy="290" rx="130" ry="12" fill="#000" opacity="0.1"/>
    <rect x="-110" y="-20" width="220" height="290" rx="26" fill="#e07a3b"/>
    <rect x="-110" y="110" width="220" height="55" fill="#2a2a2a"/>
    <path d="M-22 -20 Q-22 -50 0 -50 Q22 -50 22 -20" stroke="#2a2a2a" stroke-width="9" fill="none" stroke-linecap="round"/>
    <line x1="-85" y1="50" x2="85" y2="50" stroke="#5a3a23" stroke-width="2.5"/>
    <circle cx="85" cy="50" r="5" fill="#5a3a23"/>
    <rect x="-75" y="185" width="150" height="70" rx="8" fill="#c0691f" stroke="#8a4a14" stroke-width="2"/>
    <text x="0" y="335" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#5a3a23">大きいリュック</text>
    <text x="0" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7a5a3e">水・防災グッズ</text>
  </g>

  <!-- ===== 軽いリュック（避難用・非常食） ===== -->
  <g transform="translate(600 290)">
    <ellipse cx="0" cy="245" rx="95" ry="9" fill="#000" opacity="0.1"/>
    <rect x="-78" y="-15" width="156" height="245" rx="20" fill="#8fa869"/>
    <path d="M-18 -15 Q-18 -40 0 -40 Q18 -40 18 -15" stroke="#5a6b3e" stroke-width="7" fill="none" stroke-linecap="round"/>
    <line x1="-55" y1="45" x2="55" y2="45" stroke="#5a6b3e" stroke-width="2"/>
    <circle cx="55" cy="45" r="4" fill="#5a6b3e"/>
    <rect x="-52" y="140" width="104" height="60" rx="7" fill="#7a9658" stroke="#5a6b3e" stroke-width="1.5"/>
    <text x="0" y="290" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#5a6b3e">軽いリュック</text>
    <text x="0" y="313" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7a5a3e">非常食 2〜3日分</text>
  </g>

  <!-- ===== 家の備蓄（家のイラスト） ===== -->
  <g transform="translate(920 290)">
    <ellipse cx="0" cy="245" rx="115" ry="10" fill="#000" opacity="0.1"/>
    <!-- 家の屋根 -->
    <polygon points="-100,20 0,-40 100,20" fill="#8b5e3c"/>
    <!-- 家の本体 -->
    <rect x="-85" y="20" width="170" height="220" fill="#c89368" stroke="#8b5e3c" stroke-width="2"/>
    <!-- ドア -->
    <rect x="-20" y="160" width="40" height="80" fill="#5a3a23"/>
    <!-- 窓 -->
    <rect x="-65" y="55" width="40" height="40" fill="#f9e9b8" stroke="#5a3a23" stroke-width="1.5"/>
    <rect x="25" y="55" width="40" height="40" fill="#f9e9b8" stroke="#5a3a23" stroke-width="1.5"/>
    <!-- 備蓄を表す箱（家の中） -->
    <rect x="-50" y="115" width="30" height="35" fill="#a08056" stroke="#5a3a23" stroke-width="1"/>
    <rect x="-15" y="115" width="30" height="35" fill="#a08056" stroke="#5a3a23" stroke-width="1"/>
    <rect x="20" y="115" width="30" height="35" fill="#a08056" stroke="#5a3a23" stroke-width="1"/>
    <text x="0" y="290" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="600" fill="#5a3a23">家の備蓄</text>
    <text x="0" y="313" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7a5a3e">1〜2週間しのげる量</text>
  </g>

  <!-- 矢印 -->
  <g stroke="#8a6a4e" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="380" y1="395" x2="490" y2="395"/>
    <polyline points="480,388 490,395 480,402"/>
    <line x1="710" y1="395" x2="800" y2="395"/>
    <polyline points="790,388 800,395 790,402"/>
  </g>
  <text x="435" y="385" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#8a6a4e">+</text>
  <text x="755" y="385" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8a6a4e">家に戻る</text>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="95" font-size="42" font-weight="700" fill="#5a3a23" letter-spacing="1">「緊急避難用」と「備蓄」は</text>
    <text x="600" y="150" font-size="42" font-weight="700" fill="#5a3a23" letter-spacing="1">分けたほうがいい</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="620" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" fill="#7a5a3e">わが家の防災リュック運用法（3段階の備え）</text>
</svg>
