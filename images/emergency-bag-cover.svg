<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdecea"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#e8dcc4" opacity="0.5"/>

  <!-- 大きいリュック（オレンジと黒） -->
  <g transform="translate(400 230)">
    <!-- 影 -->
    <ellipse cx="0" cy="320" rx="160" ry="14" fill="#000" opacity="0.1"/>
    <!-- 本体 -->
    <rect x="-130" y="-20" width="260" height="320" rx="30" fill="#e07a3b"/>
    <!-- 黒い帯（中央） -->
    <rect x="-130" y="120" width="260" height="60" fill="#2a2a2a"/>
    <!-- 上部の取っ手 -->
    <path d="M-25 -20 Q-25 -55 0 -55 Q25 -55 25 -20" stroke="#2a2a2a" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- ファスナー -->
    <line x1="-100" y1="50" x2="100" y2="50" stroke="#5a3a23" stroke-width="3"/>
    <circle cx="100" cy="50" r="6" fill="#5a3a23"/>
    <!-- ポケット -->
    <rect x="-90" y="200" width="180" height="80" rx="10" fill="#c0691f" stroke="#8a4a14" stroke-width="2"/>
    <!-- 反射テープ -->
    <rect x="-110" y="240" width="30" height="15" fill="#f5e6d3" opacity="0.7"/>
    <rect x="80" y="240" width="30" height="15" fill="#f5e6d3" opacity="0.7"/>
    <!-- ラベル -->
    <text x="0" y="370" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="600" fill="#5a3a23">緊急避難用</text>
  </g>

  <!-- 小さいリュック（食料用、軽量） -->
  <g transform="translate(820 290)">
    <!-- 影 -->
    <ellipse cx="0" cy="260" rx="110" ry="10" fill="#000" opacity="0.1"/>
    <!-- 本体 -->
    <rect x="-90" y="-15" width="180" height="260" rx="22" fill="#8fa869"/>
    <!-- 上部の取っ手 -->
    <path d="M-20 -15 Q-20 -42 0 -42 Q20 -42 20 -15" stroke="#5a6b3e" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- ファスナー -->
    <line x1="-65" y1="50" x2="65" y2="50" stroke="#5a6b3e" stroke-width="2.5"/>
    <circle cx="65" cy="50" r="5" fill="#5a6b3e"/>
    <!-- ポケット -->
    <rect x="-60" y="155" width="120" height="65" rx="8" fill="#7a9658" stroke="#5a6b3e" stroke-width="1.5"/>
    <!-- ラベル -->
    <text x="0" y="305" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="600" fill="#5a6b3e">備蓄(食料)</text>
  </g>

  <!-- 矢印（分ける、を表現） -->
  <g transform="translate(630 340)">
    <line x1="-40" y1="0" x2="-15" y2="0" stroke="#8a6a4e" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="0" x2="40" y2="0" stroke="#8a6a4e" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="6" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#8a6a4e" font-weight="600">+</text>
  </g>

  <!-- タイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="100" font-size="44" font-weight="700" fill="#5a3a23" letter-spacing="1">「緊急避難用」と「備蓄」は</text>
    <text x="600" y="155" font-size="44" font-weight="700" fill="#5a3a23" letter-spacing="1">分けたほうがいい</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="610" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" fill="#7a5a3e">わが家の防災リュック運用法</text>
</svg>
