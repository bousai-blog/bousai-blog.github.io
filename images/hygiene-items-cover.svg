<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeef2"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#d4e3e8" opacity="0.4"/>

  <!-- 「水なし」アイコン（背景の薄いマーク） -->
  <g transform="translate(600 200)" opacity="0.06">
    <path d="M0 -80 Q-40 -40 -60 0 Q-60 50 0 60 Q60 50 60 0 Q40 -40 0 -80 Z" fill="#378add"/>
    <line x1="-80" y1="-80" x2="80" y2="80" stroke="#c0392b" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- ===== 左：ドライシャンプー（スプレータイプ） ===== -->
  <g transform="translate(360 360)">
    <!-- 影 -->
    <ellipse cx="0" cy="190" rx="65" ry="9" fill="#000" opacity="0.12"/>

    <!-- ボトル本体 -->
    <g>
      <!-- スプレーヘッド -->
      <rect x="-22" y="-180" width="44" height="22" rx="4" fill="#3a4458"/>
      <rect x="-28" y="-158" width="56" height="14" fill="#5a6578"/>
      <!-- ノズル -->
      <rect x="-32" y="-170" width="10" height="6" fill="#3a4458"/>
      <!-- ボトル -->
      <rect x="-40" y="-145" width="80" height="330" rx="8" fill="#fff" stroke="#6a8a8e" stroke-width="2.5"/>
      <!-- ラベル -->
      <rect x="-35" y="-90" width="70" height="170" fill="#a8d4f0" stroke="#378add" stroke-width="1.5"/>
      <text x="0" y="-50" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" font-weight="700" fill="#185fa5">DRY</text>
      <text x="0" y="-25" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" font-weight="700" fill="#185fa5">SHAMPOO</text>
      <line x1="-25" y1="-5" x2="25" y2="-5" stroke="#378add" stroke-width="1"/>
      <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185fa5">水なしで</text>
      <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185fa5">スッキリ</text>
      <!-- 装飾の波 -->
      <path d="M-25 55 Q-12 50 0 55 Q12 60 25 55" stroke="#378add" stroke-width="2" fill="none"/>
      <path d="M-25 70 Q-12 65 0 70 Q12 75 25 70" stroke="#378add" stroke-width="2" fill="none"/>
    </g>

    <!-- ラベル -->
    <text x="0" y="230" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#185fa5">ドライシャンプー</text>
    <text x="0" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b6470">髪のケアに</text>
  </g>

  <!-- ===== 中央：水道のマーク（バツ印） ===== -->
  <g transform="translate(600 370)">
    <!-- 円 -->
    <circle r="50" fill="#fff" stroke="#c0392b" stroke-width="4"/>
    <!-- 水滴 -->
    <path d="M0 -30 Q-15 -10 -18 5 Q-18 22 0 25 Q18 22 18 5 Q15 -10 0 -30 Z" fill="#a8d4f0" stroke="#378add" stroke-width="2"/>
    <!-- バツ線 -->
    <line x1="-35" y1="-35" x2="35" y2="35" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>
    <line x1="35" y1="-35" x2="-35" y2="35" stroke="#c0392b" stroke-width="5" stroke-linecap="round"/>

    <text x="0" y="90" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="20" font-weight="700" fill="#c0392b">水なし</text>
    <text x="0" y="115" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" fill="#5a3a23">でも、清潔に</text>
  </g>

  <!-- ===== 右：歯磨きシート（パッケージ） ===== -->
  <g transform="translate(840 360)">
    <!-- 影 -->
    <ellipse cx="0" cy="190" rx="80" ry="10" fill="#000" opacity="0.12"/>

    <!-- パッケージ -->
    <g>
      <rect x="-70" y="-100" width="140" height="290" rx="14" fill="#fff" stroke="#6a8a8e" stroke-width="2.5"/>
      <!-- 上部の白い帯 -->
      <rect x="-70" y="-100" width="140" height="60" fill="#27ae60"/>
      <text x="0" y="-65" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#fff">DENTAL</text>
      <!-- 中央の歯のアイコン -->
      <g transform="translate(0 -10)">
        <path d="M-30 -10 Q-30 -30 -15 -32 Q0 -30 5 -25 Q15 -32 30 -30 Q40 -25 30 0 Q25 15 18 18 Q10 18 10 8 Q8 -2 0 -2 Q-8 -2 -10 8 Q-10 18 -18 18 Q-25 15 -30 -10 Z" fill="#fff" stroke="#27ae60" stroke-width="2"/>
        <!-- きらめき -->
        <circle cx="-12" cy="-15" r="2" fill="#27ae60"/>
        <circle cx="15" cy="-13" r="1.5" fill="#27ae60"/>
      </g>

      <text x="0" y="50" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" font-weight="700" fill="#5a3a23">歯みがきシート</text>

      <line x1="-50" y1="65" x2="50" y2="65" stroke="#27ae60" stroke-width="1"/>

      <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a3a23">水なしで</text>
      <text x="0" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a3a23">口腔ケア</text>

      <!-- シートが出てくる開口部 -->
      <rect x="-30" y="130" width="60" height="20" rx="3" fill="#e8e8e8" stroke="#a8b0c0" stroke-width="1"/>
      <text x="0" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6470">30枚入</text>
    </g>

    <!-- ラベル -->
    <text x="0" y="230" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#27ae60">歯磨きシート</text>
    <text x="0" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#5b6470">口腔ケアに</text>
  </g>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="90" font-size="40" font-weight="700" fill="#185fa5" letter-spacing="1">水が使えないとき、</text>
    <text x="600" y="140" font-size="40" font-weight="700" fill="#185fa5" letter-spacing="1">お風呂はどうする？</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="625" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#5b6470">わが家の衛生グッズ事情</text>
</svg>
