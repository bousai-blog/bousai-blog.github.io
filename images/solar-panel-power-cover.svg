<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9eafa"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffeb70"/>
      <stop offset="100%" stop-color="#ffc94a"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 太陽 -->
  <g transform="translate(180 160)">
    <circle r="55" fill="url(#sun)"/>
    <!-- 光線 -->
    <g stroke="#ffc94a" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-80" x2="0" y2="-95"/>
      <line x1="0" y1="80" x2="0" y2="95"/>
      <line x1="-80" y1="0" x2="-95" y2="0"/>
      <line x1="80" y1="0" x2="95" y2="0"/>
      <line x1="-55" y1="-55" x2="-68" y2="-68"/>
      <line x1="55" y1="-55" x2="68" y2="-68"/>
      <line x1="-55" y1="55" x2="-68" y2="68"/>
      <line x1="55" y1="55" x2="68" y2="68"/>
    </g>
  </g>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#e2d4be" opacity="0.4"/>

  <!-- ===== 家とソーラーパネル ===== -->
  <g transform="translate(450 380)">
    <!-- 屋根 -->
    <polygon points="-160,-40 0,-130 160,-40" fill="#8b5e3c" stroke="#5a3a23" stroke-width="3"/>

    <!-- ソーラーパネル（屋根の上） -->
    <g transform="translate(-50 -85) rotate(-30)">
      <rect x="-65" y="-22" width="130" height="44" fill="#1e3a5f" stroke="#0f2138" stroke-width="2"/>
      <!-- パネルのグリッド -->
      <g stroke="#2a4a72" stroke-width="1">
        <line x1="-65" y1="-7" x2="65" y2="-7"/>
        <line x1="-65" y1="7" x2="65" y2="7"/>
        <line x1="-32" y1="-22" x2="-32" y2="22"/>
        <line x1="0" y1="-22" x2="0" y2="22"/>
        <line x1="32" y1="-22" x2="32" y2="22"/>
      </g>
      <!-- きらめき -->
      <circle cx="-40" cy="-10" r="2" fill="#fff" opacity="0.8"/>
      <circle cx="25" cy="5" r="1.5" fill="#fff" opacity="0.7"/>
    </g>

    <!-- 家本体 -->
    <rect x="-130" y="-40" width="260" height="200" fill="#f5e6c8" stroke="#5a3a23" stroke-width="3"/>

    <!-- 窓 -->
    <rect x="-100" y="-10" width="60" height="60" fill="#a8d4f0" stroke="#5a3a23" stroke-width="2"/>
    <line x1="-70" y1="-10" x2="-70" y2="50" stroke="#5a3a23" stroke-width="2"/>
    <line x1="-100" y1="20" x2="-40" y2="20" stroke="#5a3a23" stroke-width="2"/>

    <rect x="40" y="-10" width="60" height="60" fill="#a8d4f0" stroke="#5a3a23" stroke-width="2"/>
    <line x1="70" y1="-10" x2="70" y2="50" stroke="#5a3a23" stroke-width="2"/>
    <line x1="40" y1="20" x2="100" y2="20" stroke="#5a3a23" stroke-width="2"/>

    <!-- ドア -->
    <rect x="-25" y="80" width="50" height="80" fill="#8b5e3c" stroke="#5a3a23" stroke-width="2"/>
    <circle cx="15" cy="120" r="3" fill="#d4a574"/>

    <!-- パワーコンディショナー（壁にある小さなボックス） -->
    <g transform="translate(-110 95)">
      <rect x="-15" y="-12" width="30" height="36" fill="#fff" stroke="#5a3a23" stroke-width="1.5"/>
      <circle cx="0" cy="-2" r="3" fill="#27ae60"/>
      <rect x="-8" y="8" width="16" height="6" fill="#a8b0c0"/>
      <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a3a23">非常用</text>
      <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a3a23">コンセント</text>
    </g>
  </g>

  <!-- 電気の流れの矢印（太陽→パネル→家） -->
  <g stroke="#f39c12" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="6,5">
    <path d="M250 200 Q350 200 400 290"/>
  </g>

  <!-- ===== 右下：スマホ充電のイメージ ===== -->
  <g transform="translate(900 400)">
    <!-- 影 -->
    <ellipse cx="0" cy="120" rx="80" ry="8" fill="#000" opacity="0.1"/>

    <!-- スマホ -->
    <rect x="-40" y="-90" width="80" height="160" rx="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="-32" y="-78" width="64" height="130" rx="2" fill="#a8d4f0"/>

    <!-- バッテリーマーク -->
    <g transform="translate(0 -10)">
      <rect x="-22" y="-18" width="44" height="22" rx="2" fill="none" stroke="#27ae60" stroke-width="2.5"/>
      <rect x="22" y="-13" width="3" height="12" fill="#27ae60"/>
      <rect x="-18" y="-14" width="36" height="14" fill="#27ae60"/>
      <text x="0" y="-2" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#fff">80%</text>
    </g>

    <!-- 充電中マーク -->
    <text x="0" y="25" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#27ae60" font-weight="700">⚡ 充電中</text>

    <!-- 充電ケーブル -->
    <path d="M0 70 Q0 95 -30 105 Q-60 115 -100 110" stroke="#5a3a23" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- ラベル -->
    <text x="0" y="155" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" font-weight="700" fill="#27ae60">停電でも、</text>
    <text x="0" y="178" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="16" font-weight="700" fill="#27ae60">スマホが充電できる！</text>
  </g>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="80" font-size="40" font-weight="700" fill="#1e3a5f" letter-spacing="1">太陽光パネル、</text>
    <text x="600" y="130" font-size="40" font-weight="700" fill="#1e3a5f" letter-spacing="1">停電のときに使えますか？</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="625" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#5b6470">わが家の電気の備え（自立運転モードのこと）</text>
</svg>
