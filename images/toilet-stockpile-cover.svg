<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6d9"/>
      <stop offset="100%" stop-color="#f7f6f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 床のライン -->
  <rect y="540" width="1200" height="135" fill="#e0d4be" opacity="0.4"/>

  <!-- ===== 左：「10個」(これまで) ===== -->
  <g transform="translate(300 380)">
    <text x="0" y="-180" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#7a5a3e">これまでの備蓄</text>

    <!-- 簡易トイレの袋（10個） -->
    <g>
      <!-- 1段目（5個） -->
      <g transform="translate(-80 -100)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(-40 -100)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(0 -100)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(40 -100)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(80 -100)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>

      <!-- 2段目（5個） -->
      <g transform="translate(-80 -40)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(-40 -40)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(0 -40)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(40 -40)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
      <g transform="translate(80 -40)">
        <rect x="-15" y="-25" width="30" height="50" rx="3" fill="#e07a3b" stroke="#8a4a14" stroke-width="2"/>
        <text x="0" y="3" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">TOILET</text>
      </g>
    </g>

    <text x="0" y="40" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="60" font-weight="700" fill="#c0392b">10個</text>
    <text x="0" y="80" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7a5a3e">家族で1日も持たない…</text>
  </g>

  <!-- 中央の矢印と気づき -->
  <g transform="translate(600 360)">
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
    <polyline points="35,-12 50,0 35,12" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="-30" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="700" fill="#c0392b">えっ！</text>
    <text x="0" y="30" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="14" fill="#5a3a23">必要なのは…</text>
  </g>

  <!-- ===== 右：「1週間分は140個」(必要量) ===== -->
  <g transform="translate(900 380)">
    <text x="0" y="-180" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#7a5a3e">4人家族の1週間分</text>

    <!-- たくさんの簡易トイレ（密集） -->
    <g>
      <!-- 5x6 = 30個 (実際は140-196個だが、ビジュアルとして) -->
      <g opacity="0.95">
        <g transform="translate(-80 -130)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(-48 -130)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(-16 -130)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(16 -130)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(48 -130)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(80 -130)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>

        <g transform="translate(-80 -85)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(-48 -85)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(-16 -85)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(16 -85)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(48 -85)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(80 -85)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>

        <g transform="translate(-80 -40)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(-48 -40)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(-16 -40)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(16 -40)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(48 -40)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>
        <g transform="translate(80 -40)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5"/></g>

        <g transform="translate(-80 5)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5" opacity="0.5"/></g>
        <g transform="translate(-48 5)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5" opacity="0.5"/></g>
        <g transform="translate(-16 5)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5" opacity="0.5"/></g>
        <g transform="translate(16 5)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5" opacity="0.5"/></g>
        <g transform="translate(48 5)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5" opacity="0.5"/></g>
        <g transform="translate(80 5)"><rect x="-12" y="-20" width="24" height="40" rx="2" fill="#e07a3b" stroke="#8a4a14" stroke-width="1.5" opacity="0.5"/></g>
      </g>
    </g>

    <text x="0" y="45" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="60" font-weight="700" fill="#27ae60">140個</text>
    <text x="0" y="85" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7a5a3e">が目安だった！</text>
  </g>

  <!-- メインタイトル -->
  <g text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif">
    <text x="600" y="90" font-size="42" font-weight="700" fill="#5a3a23" letter-spacing="1">簡易トイレ10個じゃ</text>
    <text x="600" y="148" font-size="42" font-weight="700" fill="#5a3a23" letter-spacing="1">足りなかった</text>
  </g>

  <!-- サブタイトル -->
  <text x="600" y="625" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="18" fill="#7a5a3e">わが家のトイレ備蓄、見直してみました</text>
</svg>
