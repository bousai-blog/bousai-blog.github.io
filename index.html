<script>
(() => {
  const list      = document.getElementById('post-list');
  const countLbl  = document.getElementById('count-label');
  const searchIn  = document.getElementById('search-input');
  const catBtns   = document.querySelectorAll('.cat-btn, .bottom-nav-btn');

  const urlParams  = new URLSearchParams(location.search);
  let activeCat    = urlParams.get('cat') || 'all';
  let searchQuery  = '';
  let allPosts     = [];

  // 7日以内かどうか
  const isNew = d => (Date.now() - new Date(d)) < 7 * 86400000;

  function catClass(cat) {
    return 'cat-' + (cat || '防災グッズ');
  }

  function renderPosts(posts) {
    if (posts.length === 0) {
      list.innerHTML = '<li class="state-msg">該当する記事がありません。</li>';
      countLbl.textContent = '0件';
      return;
    }
    countLbl.textContent = posts.length + '件';
    list.innerHTML = '';
    posts.forEach(p => {
      const cat = p.category || '防災グッズ';
      const li = document.createElement('li');
      li.className = 'post-item';
      li.dataset.category = cat;
      const cover = p.cover
        ? `<div class="post-thumb"><img src="${p.cover}" alt="${p.title}" loading="lazy"></div>`
        : '';
      li.innerHTML = `
        <a class="post-link" href="post.html?slug=${encodeURIComponent(p.slug)}">
          ${cover}
          <div class="post-body">
            <div class="post-top-meta">
              <span class="post-cat-badge ${catClass(cat)}">${cat}</span>
              <time class="post-date">${p.date}</time>
              ${isNew(p.date) ? '<span class="new-badge">NEW</span>' : ''}
            </div>
            <span class="post-title">${p.title}</span>
            ${p.summary ? `<span class="post-summary">${p.summary}</span>` : ''}
          </div>
        </a>`;
      list.appendChild(li);
    });
  }

  function applyFilter() {
    let filtered = allPosts;
    if (activeCat !== 'all') {
      filtered = filtered.filter(p => p.category === activeCat);
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(p =>
        p.title.toLowerCase().includes(q) ||
        (p.summary || '').toLowerCase().includes(q)
      );
    }
    renderPosts(filtered);
  }

  function setActiveCat(cat) {
    activeCat = cat;
    catBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.cat === cat);
    });
    const url = cat === 'all' ? './' : `./?cat=${encodeURIComponent(cat)}`;
    history.replaceState(null, '', url);
    applyFilter();
  }

  catBtns.forEach(btn => btn.addEventListener('click', () => setActiveCat(btn.dataset.cat)));

  // デバウンス検索
  let searchTimer;
  searchIn.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      applyFilter();
    }, 250);
  });

  // ヘッダーナビのアクティブ設定
  document.querySelectorAll('.header-nav a').forEach(a => {
    const cat = new URL(a.href).searchParams.get('cat');
    if (cat === activeCat) a.classList.add('active');
  });

  (async () => {
    try {
      const res = await fetch('posts/posts.json?_=' + Date.now());
      if (!res.ok) throw new Error('記事の取得に失敗しました');
      allPosts = await res.json();
      allPosts.sort((a, b) => a.date < b.date ? 1 : -1);
      setActiveCat(activeCat);
    } catch (e) {
      list.innerHTML = `<li class="state-msg" style="color:#b91c1c">読み込みに失敗しました: ${e.message}</li>`;
    }
  })();
})();
</script>
